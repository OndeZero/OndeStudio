# OndeStudio public vhost on tyrell (RFC 0002, Stage 3).
# ONLY the external self-service surface (/self SPA + /api/v1/self/*) and the
# public read seam (/api/v1/stations/*/{now,sse}) face the internet; the whole
# team/admin API stays tailnet-only (403 below). Upstream = onde-zero over the
# tailnet — an encrypted hop, same pattern as the team's own access.
# Install: /etc/nginx/sites-available/studio2.ondezero.net + symlink
# (deploy/tyrell/install-vhost.sh does it). Cert = existing *.ondezero.net wildcard.

# per-IP throttle for the ONE public login: argon2 is CPU-costly and the app is
# a single Bun process — an anonymous /self/login flood could starve the
# now-poll / driver sweep / projection loops on the same event loop.
limit_req_zone $binary_remote_addr zone=oslogin:10m rate=5r/m;
map $http_upgrade $connection_upgrade { default upgrade; '' close; }

server {
    listen 80;
    listen [::]:80;
    server_name studio2.ondezero.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name studio2.ondezero.net;
    ssl_certificate     /etc/nginx/ssl/#.ondezero.net_ondezero.net_4096/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/#.ondezero.net_ondezero.net_4096/private.key;
    access_log /var/log/nginx/studio2-access.log;
    error_log  /var/log/nginx/studio2-error.log;

    # SPA shell + hashed assets (the external webcaster page needs the bundle).
    location / {
        proxy_pass http://100.84.152.42:4400;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # drives the Secure cookie flag
    }

    # the one public login — edge-throttled.
    location = /api/v1/self/login {
        limit_req zone=oslogin burst=3 nodelay;
        proxy_pass http://100.84.152.42:4400;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # self-service API (Upgrade kept for future websocket use on this surface).
    location ^~ /api/v1/self/ {
        proxy_pass http://100.84.152.42:4400;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # public read seam: now + SSE (buffering off, long read for the stream).
    location ~ ^/api/v1/stations/[^/]+/(now|sse)$ {
        proxy_pass http://100.84.152.42:4400;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    # everything else under /api/v1 is team-only → never on the internet.
    # (Also keeps /api/v1/openapi.json and /api/v1/health off the public origin.)
    location /api/v1/ { return 403; }
}
